<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harry Potter – Cover</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── PAGE-SPECIFIC: COVER ── */
    body {
      background: #0a0812;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      cursor: none;
    }

    /* ── STARFIELD ── */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .stars span {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%,100% { opacity:0; transform:scale(1); }
      50%      { opacity: var(--o, 0.8); transform:scale(1.4); }
    }

    /* ── HOGWARTS BG IMAGE ── */
    .bg-castle {
      position: fixed;
      inset: 0;
      background: url('https://w0.peakpx.com/wallpaper/892/966/HD-wallpaper-hogwarts-castle-harry-potter.jpg') center center / cover no-repeat;
      opacity: 0.18;
      z-index: 0;
    }
    .bg-castle::after {
      content:'';
      position:absolute; inset:0;
      background: radial-gradient(ellipse at center, transparent 30%, #0a0812 80%);
    }

    /* ── FEATHER ── */
    .feather-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .feather {
      position: absolute;
      font-size: 1.8rem;
      animation: floatFeather var(--fd, 8s) ease-in-out var(--fdelay, 0s) infinite;
      opacity: 0;
      filter: drop-shadow(0 0 6px rgba(200,180,255,0.7));
    }
    @keyframes floatFeather {
      0%   { opacity:0;   transform: translateY(110vh) rotate(var(--fr, 15deg)); }
      10%  { opacity:0.7; }
      90%  { opacity:0.5; }
      100% { opacity:0;   transform: translateY(-10vh) rotate(calc(var(--fr, 15deg) + 30deg)); }
    }

    /* ── CUSTOM CURSOR WAND ── */
    .cursor-wand {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-size: 1.4rem;
      transform: translate(-50%, -50%) rotate(-40deg);
      filter: drop-shadow(0 0 8px rgba(255,220,100,0.9));
      transition: transform 0.05s;
    }
    .spark {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      border-radius: 50%;
      animation: sparkFade 0.6s ease-out forwards;
    }
    @keyframes sparkFade {
      0%   { opacity:1; transform:scale(1); }
      100% { opacity:0; transform:scale(0) translate(var(--sx,0), var(--sy,0)); }
    }

    /* ── CONTENT ── */
    .cover-content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .lightning {
      font-size: clamp(3rem, 10vw, 6rem);
      animation: lightningFlash 4s ease-in-out infinite;
      display: block;
      margin-bottom: 8px;
    }
    @keyframes lightningFlash {
      0%,90%,100% { opacity:1; filter: drop-shadow(0 0 10px gold); }
      92%          { opacity:0.2; filter: none; }
      94%          { opacity:1; filter: drop-shadow(0 0 30px gold); }
      96%          { opacity:0.3; }
      98%          { opacity:1; filter: drop-shadow(0 0 20px gold); }
    }

    h1.titulo {
      font-family: 'HarryPotter', 'Palatino Linotype', serif;
      font-size: clamp(3rem, 9vw, 7rem);
      color: #f0c040;
      text-shadow:
        0 0 20px rgba(240,192,64,0.8),
        0 0 60px rgba(240,192,64,0.4),
        2px 2px 0 #4a2000;
      line-height: 1;
      margin: 0;
      animation: titleGlow 3s ease-in-out infinite;
    }
    @keyframes titleGlow {
      0%,100% { text-shadow: 0 0 20px rgba(240,192,64,0.8), 0 0 60px rgba(240,192,64,0.4), 2px 2px 0 #4a2000; }
      50%      { text-shadow: 0 0 40px rgba(240,192,64,1),   0 0 100px rgba(240,192,64,0.7), 2px 2px 0 #4a2000; }
    }

    .subtitle {
      font-family: 'IM Fell English', 'Georgia', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      color: #c9b8f0;
      letter-spacing: 0.15em;
      margin-top: 12px;
      text-shadow: 0 0 20px rgba(180,140,255,0.5);
      animation: fadeInUp 1.2s ease 0.5s both;
    }

    .divider {
      width: 300px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #f0c040, transparent);
      margin: 28px auto;
      position: relative;
      animation: fadeInUp 1s ease 0.8s both;
    }
    .divider::before {
      content: '✦';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      color: #f0c040;
      font-size: 1rem;
      background: #0a0812;
      padding: 0 10px;
    }

    /* ── NEXT BUTTON ── */
    .btn-next {
      display: inline-block;
      font-family: 'IM Fell English', serif;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #0a0812;
      background: linear-gradient(135deg, #f0c040 0%, #c8860a 100%);
      border: none;
      padding: 16px 48px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      box-shadow: 0 0 30px rgba(240,192,64,0.4);
      animation: fadeInUp 1s ease 1.1s both;
      transition: box-shadow 0.3s, transform 0.2s;
      font-weight: 600;
    }
    .btn-next::before {
      content:'';
      position:absolute; inset:0;
      background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }
    .btn-next:hover::before { transform: translateX(100%); }
    .btn-next:hover {
      box-shadow: 0 0 60px rgba(240,192,64,0.8);
      transform: translateY(-2px);
    }

    /* ── NEW BUTTON (top-right corner) ── */
    .btn-new {
      position: fixed;
      top: 24px; right: 24px;
      z-index: 10;
      font-family: 'IM Fell English', serif;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c9b8f0;
      text-decoration: none;
      border: 1px solid rgba(200,180,255,0.3);
      padding: 10px 20px;
      background: rgba(10,8,18,0.7);
      backdrop-filter: blur(8px);
      transition: all 0.3s;
    }
    .btn-new:hover {
      color: #fff;
      border-color: rgba(200,180,255,0.8);
      box-shadow: 0 0 20px rgba(180,140,255,0.3);
    }

    @keyframes fadeInUp {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-castle"></div>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Floating feathers -->
  <div class="feather-wrap" id="feathers"></div>

  <!-- Custom wand cursor -->
  <div class="cursor-wand" id="cursor">🪄</div>

  <!-- Nav: NEW page -->
  <a href="new.html" class="btn-new">✦ New Series</a>

  <!-- MAIN CONTENT -->
  <div class="cover-content">
    <span class="lightning">⚡</span>
    <h1 class="titulo">Harry Potter</h1>
    <p class="subtitle">Bienvenidos al Mundo Mágico</p>
    <div class="divider"></div>
    <a href="next.html" class="btn-next">Next &nbsp;→</a>
  </div>

  <script>
    // ── STARS ──
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('span');
      s.style.cssText = `
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        --d:${2+Math.random()*5}s;
        --o:${0.4+Math.random()*0.6};
        animation-delay:${Math.random()*6}s;
        width:${1+Math.random()*2}px;
        height:${1+Math.random()*2}px;
      `;
      starsEl.appendChild(s);
    }

    // ── FEATHERS ──
    const feathersEl = document.getElementById('feathers');
    const featherEmojis = ['🪶','🪶','🪶'];
    for (let i = 0; i < 8; i++) {
      const f = document.createElement('div');
      f.className = 'feather';
      f.textContent = featherEmojis[i % featherEmojis.length];
      f.style.cssText = `
        left:${5+Math.random()*90}%;
        --fd:${7+Math.random()*6}s;
        --fdelay:${Math.random()*8}s;
        --fr:${-20+Math.random()*40}deg;
        font-size:${1.2+Math.random()*1.2}rem;
      `;
      feathersEl.appendChild(f);
    }

    // ── WAND CURSOR ──
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });
    document.addEventListener('click', e => {
      const colors = ['#f0c040','#c9b8f0','#80ffea','#ff8040','#ffffff'];
      for (let i = 0; i < 10; i++) {
        const spark = document.createElement('div');
        const size  = 4 + Math.random()*8;
        const angle = Math.random()*Math.PI*2;
        const dist  = 20 + Math.random()*40;
        spark.className = 'spark';
        spark.style.cssText = `
          left:${e.clientX}px; top:${e.clientY}px;
          width:${size}px; height:${size}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          --sx:${Math.cos(angle)*dist}px;
          --sy:${Math.sin(angle)*dist}px;
          box-shadow: 0 0 6px currentColor;
        `;
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 600);
      }
    });
  </script>
</body>
</html>
